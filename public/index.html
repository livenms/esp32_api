<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Broodinnox Control Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b1220;
  --panel:#111a2e;
  --panel2:#0f172a;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --accent:#22c55e;
  --warn:#f59e0b;
  --danger:#ef4444;
  --cyan:#06b6d4;
}

*{box-sizing:border-box;}
body{
  margin:0;
  font-family:Inter, sans-serif;
  background:var(--bg);
  color:var(--text);
}

header{
  padding:16px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:linear-gradient(90deg,#0f172a,#111a2e);
  border-bottom:1px solid #1f2a44;
}

.logo{
  font-weight:700;
  letter-spacing:1px;
}

.status-bar{
  display:flex;
  gap:12px;
  align-items:center;
}

.badge{
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  background:#1f2937;
  color:var(--muted);
}

.badge.ok{background:#052e1b;color:#22c55e;}
.badge.warn{background:#3a2a05;color:#f59e0b;}
.badge.bad{background:#3a0a0a;color:#ef4444;}

main{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:16px;
}

.card{
  background:var(--panel);
  border:1px solid #1f2a44;
  border-radius:14px;
  padding:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.card h3{
  margin:0 0 8px 0;
  font-size:14px;
  color:var(--muted);
  font-weight:500;
}

.value{
  font-size:28px;
  font-weight:700;
}

.row{
  display:flex;
  justify-content:space-between;
  margin-top:8px;
  font-size:13px;
  color:var(--muted);
}

.indicator{
  width:10px;
  height:10px;
  border-radius:50%;
  display:inline-block;
}

.green{background:var(--accent);}
.red{background:var(--danger);}

.chart{
  height:120px;
  background:linear-gradient(180deg,#0f172a,#0b1220);
  border-radius:10px;
  margin-top:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--muted);
  font-size:12px;
}

footer{
  padding:16px;
  text-align:center;
  color:var(--muted);
  font-size:12px;
}

button{
  background:#1f2937;
  border:1px solid #2b3a55;
  color:var(--text);
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  border-color:var(--cyan);
}
</style>
</head>

<body>

<header>
  <div class="logo">BROODINNOX CONTROL SYSTEM</div>
  <div class="status-bar">
    <div class="badge ok" id="mqttStatus">MQTT: ONLINE</div>
    <div class="badge warn" id="gsmStatus">GSM: CONNECTING</div>
    <div class="badge" id="modeStatus">AUTO MODE</div>
  </div>
</header>

<main>

  <div class="card">
    <h3>Temperature</h3>
    <div class="value" id="temp">36.2°C</div>
    <div class="row"><span>Sensor Avg</span><span id="avg">OK</span></div>
    <div class="chart">Live trend</div>
  </div>

  <div class="card">
    <h3>Relay Status</h3>
    <div class="value"><span class="indicator green"></span> ACTIVE</div>
    <div class="row"><span>Mode</span><span>AUTO</span></div>
    <button onclick="toggleRelay()">Toggle Relay</button>
  </div>

  <div class="card">
    <h3>Brooding Cycle</h3>
    <div class="value"><span id="day">12</span>/30</div>
    <div class="row"><span>Status</span><span>RUNNING</span></div>
  </div>

  <div class="card">
    <h3>System Health</h3>
    <div class="row"><span>GSM</span><span id="gsm">OK</span></div>
    <div class="row"><span>MQTT</span><span id="mqtt">OK</span></div>
    <div class="row"><span>Sensors</span><span>4/4</span></div>
  </div>

</main>

<footer>
  Broodinnox Smart Brooding System • Industrial IoT Interface
</footer>

<script>
function toggleRelay(){
  alert("Relay command sent (hook MQTT here)");
}

// Simulated live updates
setInterval(()=>{
  document.getElementById("temp").innerText = (35 + Math.random()*2).toFixed(1)+"°C";
},2000);
</script>

</body>
</html>
