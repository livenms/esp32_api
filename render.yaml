services:
  - type: web
    name: broodinnox-dashboard
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MQTT_BROKER
        value: test.mosquitto.org
      - key: MQTT_PORT
        value: 1883
      - key: DEVICE_ID
        value: BROODIINNOX-001
      - key: PORT
        value: 3000
