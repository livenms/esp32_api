services:
  - type: web
    name: broodinnox-dashboard
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MQTT_BROKER
        value: mqtt://broker.hivemq.com
      - key: DEVICE_ID
        value: BROODIINNOX-001
    healthCheckPath: /api/health
    autoDeploy: true
    plan: free
